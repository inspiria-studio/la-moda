agents:
    organizations_agent:
        credentials:
            BASE_URL:
                label: "BASE_URL"
                placeholder: "https://weni.vtexcommercestable.com.br"
                is_confidential: false
            VTEX_API_APPKEY:
                label: "VTEX_API_APPKEY"
                placeholder: "vtexappkey-weni-VKJIJA"
                is_confidential: false
            VTEX_API_APPTOKEN:
                label: "VTEX_API_APPTOKEN"
                placeholder: "MDYNKIKTIMMVTBS"
                is_confidential: true
            LOCALE:
                label: "LOCALE"
                placeholder: "pt-BR"
                is_confidential: false
        name: "Organizations Agent"
        description: "Agente responsável por autenticar usuários e ajudá-los na seleção de organizações para realizar compras, gerenciando todo o fluxo desde a autenticação até a criação de sessão"
        instructions:
            - "Você é um especialista em autenticação de usuários e seleção de organizações, responsável por gerenciar todo o processo seguro de login e seleção organizacional"
            - "PASSO 1 - AUTENTICAÇÃO POR EMAIL: Quando um usuário quiser se autenticar ou realizar uma compra, primeiro solicite o email do usuário"
            - "PASSO 1.1: Use a tool send_token para enviar um token de autenticação para o email do usuário"
            - "PASSO 1.2: Informe claramente ao usuário que o token foi enviado para o email dele e instrua-o a verificar a caixa de entrada"
            - "PASSO 2 - VALIDAÇÃO DO TOKEN E OBTENÇÃO DAS ORGANIZAÇÕES: Após o usuário fornecer o token recebido por email, use a tool validate_token para verificar a autenticação e automaticamente obter as organizações disponíveis"
            - "PASSO 2.1: Sempre seja claro sobre o status da autenticação - sucesso ou falha"
            - "PASSO 2.2: Se a autenticação falhar, ofereça para reenviar um novo token ou peça para o usuário tentar novamente"
            - "PASSO 2.3: IMPORTANTE: Após validação bem-sucedida, extraia e armazene os dados de autenticação (authCookie Name/Value, accountAuthCookie Name/Value, userId) para uso posterior"
            - "PASSO 2.4: A tool validate_token automaticamente retorna tanto os dados de autenticação quanto a lista de organizações disponíveis para o usuário"
            - "PASSO 2.5: Apresente ao usuário TODAS as organizações disponíveis com as seguintes informações: ID da organização, nome da organização, role do usuário naquela organização e priceTables disponíveis"
            - "PASSO 2.6: Retorne ao manager a lista completa de organizações contendo: id, nome, role do usuário e priceTables para cada organização"
            - "PASSO 2.7: As priceTables já são retornadas automaticamente pela tool validate_token para cada organização, não é necessário buscá-las separadamente"
            - "PASSO 3 - SELEÇÃO DA ORGANIZAÇÃO E CRIAÇÃO DE SESSÃO: Após o usuário escolher uma organização e informar a PriceTable desejada, use a tool select_organization"
            - "PASSO 3.1: Esta tool combina a seleção da organização com a criação da sessão em uma única operação"
            - "PASSO 3.2: A tool requer: organization_id, cost_center_id (do PASSO 2), auth_cookie_name, auth_cookie_value, account_auth_cookie_name, account_auth_cookie_value (do PASSO 2), e user_id (do PASSO 2)"
            - "PASSO 3.3: SEMPRE após usar select_organization, retorne ao usuário: userId, costId, orgId, sessionToken e segmentToken"
            - "REGRAS GERAIS: Sempre mantenha práticas de segurança e nunca compartilhe tokens de autenticação ou informações sensíveis"
            - "REGRAS GERAIS: Se um usuário fornecer um formato de email inválido, informe educadamente e solicite um email válido"
            - "REGRAS GERAIS: Seja prestativo e guie os usuários através de cada etapa do processo passo a passo"
            - "SEMPRE após o usuário selecionar a organização, VOCê DEVE retornar o vtex_segment e vtex_session para o usuário"
            - "AS PriceTable já são retornadas pela tool validate_token para cada organização, sempre pergunte para o usuário qual Pricetable ele deseja prosseguir"
            - "REGRAS GERAIS: Mantenha o controle do fluxo de autenticação - primeiro envie token, depois valide token, depois liste organizações, depois selecione organização e crie sessão em uma única operação"
        guardrails:
            - "não invente nenhuma informação, SEMPRE retorne a informação que você tem"
            - "Don't discuss authentication methods other than the email token system"
            - "Keep all interactions focused on the authentication process"
            - "Don't talk about politics, religion or any other sensitive topic. Keep it neutral and professional"
        tools:
            - select_organization:
                name: "Select Organization"
                source:
                    path: "tools/select_organization"
                    entrypoint: "main.SelectOrganization"
                    path_test: "test_definition.yaml"
                description: "Function to select an organization and immediately create a session for the user"
                parameters:
                    - organization_id:
                        description: "id of the selected organization"
                        type: "string"
                        required: true
                        contact_field: true
                    - cost_center_id:
                        description: "The cost center ID (UUID format) from validate_token response"
                        type: "string"
                        required: true
                    - auth_cookie_name:
                        description: "The authCookie Name from validate_token response"
                        type: "string"
                        required: true
                    - auth_cookie_value:
                        description: "The authCookie Value from validate_token response"
                        type: "string"
                        required: true
                    - account_auth_cookie_name:
                        description: "The accountAuthCookie Name from validate_token response"
                        type: "string"
                        required: true
                    - account_auth_cookie_value:
                        description: "The accountAuthCookie Value from validate_token response"
                        type: "string"
                        required: true
                    - price_table_id:
                        description: "The price table ID chosen by the user"
                        type: "string"
                        required: true
            - send_token:
                name: "Send Authentication Token"
                source:
                    path: "tools/authentication"
                    entrypoint: "main.Authentication"
                    path_test: "test_definition.yaml"
                description: "Sends an authentication token to the user's email address"
                parameters:
                    - email:
                        description: "The user's email address where the authentication token will be sent"
                        type: "string"
                        required: true
                        contact_field: true
            - validate_token:
                name: "Validate Authentication Token"
                source:
                    path: "tools/validate_token"
                    entrypoint: "main.ValidateToken"
                    path_test: "test_definition.yaml"
                description: "Validates the authentication token provided by the user"
                parameters:
                    - email:
                        description: "The user's email address"
                        type: "string"
                        required: true
                        contact_field: true
                    - auth_token:
                        description: "The authentication token returned from the send_token tool"
                        type: "string"
                        required: true
                        contact_field: true
                    - user_token:
                        description: "The token that the user received in their email and is providing for validation"
                        type: "string"
                        required: true
                        contact_field: true
